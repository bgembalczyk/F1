[pytest]
testpaths = tests
addopts = --strict-markers
markers =
    unit: Fast tests validating isolated units (domyślny marker dla testów niepasujących do innych profili).
    contract: Contract/API boundary tests for cross-module behavior and compatibility.
    architecture: Tests enforcing architecture/import boundaries and structural constraints.
    integration: End-to-end/integration flows touching multiple layers or filesystem/network boundaries.
