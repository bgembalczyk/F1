[importlinter]
root_packages =
    scrapers
    layers
    models
    validation
    infrastructure

[contract:models_must_not_depend_on_infrastructure]
name = Modele i walidacja nie mogą zależeć od infrastruktury
type = forbidden
source_modules =
    models
    validation
forbidden_modules =
    infrastructure

[contract:core_layers_must_not_depend_on_scrapers]
name = Warstwy core nie mogą zależeć od scraperów
type = forbidden
source_modules =
    models
    validation
    layers
forbidden_modules =
    scrapers
