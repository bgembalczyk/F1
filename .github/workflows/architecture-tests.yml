name: Architecture tests

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  architecture-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Check command migration map docs sync
        run: |
          python scripts/docs/generate_command_migration_map.py --check

      - name: Run architecture contract tests
        run: |
          pytest -q \
            tests/test_architecture_import_rules.py \
            tests/test_architecture_duplicate_blocks.py \
            tests/test_base_contracts.py \
            tests/test_domain_entrypoints_contract.py \
            tests/test_section_architecture_boundaries.py
