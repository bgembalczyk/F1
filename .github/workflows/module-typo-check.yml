name: Module typo check

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  check-known-module-typos:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Check known module typos
        run: python scripts/check_known_module_typos.py

      - name: Check forbidden domain terminology variants
        run: python scripts/check_domain_terminology.py
