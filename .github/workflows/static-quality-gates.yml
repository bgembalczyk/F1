name: Static quality gates

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read
  pull-requests: write

env:
  NEW_DUPLICATES_WARN_THRESHOLD: "1"
  NEW_DUPLICATES_FAIL_THRESHOLD: "3"
  MYPY_ERROR_BUDGET: "0"
  FUNCTION_MAX_LINES: "80"
  FUNCTION_MAX_NESTING: "4"
  FUNCTION_MAX_BRANCHES: "12"

jobs:
  static-analysis:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Setup Node.js (jscpd)
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Complexity warning threshold (radon)
        continue-on-error: true
        run: |
          radon cc scrapers layers models validation infrastructure \
            --show-complexity \
            --min B

      - name: Complexity error threshold (xenon)
        run: |
          xenon scrapers layers models validation infrastructure \
            --max-absolute C \
            --max-modules C \
            --max-average B

      - name: Duplicate code and oversized units gate (pylint)
        run: |
          pylint scrapers layers models validation infrastructure --rcfile=.pylintrc

      - name: Validate PR template required fields and checklist
        if: github.event_name == 'pull_request'
        shell: bash
        run: |
          python scripts/ci/validate_pr_template.py \
            --base-sha "${{ github.event.pull_request.base.sha }}" \
            --head-sha "${{ github.sha }}" \
            --pr-body "${{ github.event.pull_request.body || '' }}"

      - name: Enforce ADR reference for architecture changes
        shell: bash
        run: |
          python scripts/ci/enforce_architecture_adr_reference.py \
            --base-sha "${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event.before }}" \
            --head-sha "${{ github.sha }}" \
            --pr-title "${{ github.event_name == 'pull_request' && github.event.pull_request.title || '' }}" \
            --pr-body "${{ github.event_name == 'pull_request' && github.event.pull_request.body || '' }}"

      - name: Detect changed Python files
        id: changed-py
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            BASE_SHA="${{ github.event.pull_request.base.sha }}"
          else
            BASE_SHA="${{ github.event.before }}"
          fi
          echo "base_sha=$BASE_SHA" >> "$GITHUB_OUTPUT"

          mapfile -t PY_FILES < <(git diff --name-only --diff-filter=ACMR "$BASE_SHA" "${{ github.sha }}" -- '*.py')
          if [[ ${#PY_FILES[@]} -eq 0 ]]; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "changed_files=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          printf 'Zmodyfikowane pliki Python:\n%s\n' "${PY_FILES[*]}"
          CHANGED_FILES=$(printf '%s\n' "${PY_FILES[@]}" | paste -sd, -)
          echo "has_changes=true" >> "$GITHUB_OUTPUT"
          echo "changed_files=$CHANGED_FILES" >> "$GITHUB_OUTPUT"

      - name: Scan changed Python files for duplicate fragments (jscpd)
        if: steps.changed-py.outputs.has_changes == 'true'
        run: |
          mkdir -p .jscpd-report
          npx jscpd \
            --pattern "**/*.py" \
            --min-lines 5 \
            --min-tokens 50 \
            --threshold 100 \
            --reporters json \
            --output .jscpd-report \
            $(echo "${{ steps.changed-py.outputs.changed_files }}" | tr ',' ' ')

      - name: Build duplicate report and evaluate thresholds
        if: always()
        id: dup-report
        shell: bash
        run: |
          mkdir -p .jscpd-report
          echo "## Raport duplikatów (jscpd)" > .jscpd-report/pr-comment.md
          echo "" >> .jscpd-report/pr-comment.md
          echo "ℹ️ Raport nie został jeszcze wygenerowany." >> .jscpd-report/pr-comment.md
          python scripts/ci/duplicate_report.py \
            --report-json .jscpd-report/jscpd-report.json \
            --output-md .jscpd-report/pr-comment.md \
            --warn-threshold "$NEW_DUPLICATES_WARN_THRESHOLD" \
            --fail-threshold "$NEW_DUPLICATES_FAIL_THRESHOLD" \
            --base-sha "${{ steps.changed-py.outputs.base_sha }}" \
            --head-sha "${{ github.sha }}" \
            --changed-files "${{ steps.changed-py.outputs.changed_files }}" \
            --github-output "$GITHUB_OUTPUT"

      - name: Publish duplicate report as PR comment
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository && always()
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          recreate: true
          path: .jscpd-report/pr-comment.md

      - name: Skip PR comment for forked repositories (read-only token)
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != github.repository && always()
        run: |
          echo "::warning::Pomijam publikację komentarza PR dla forka (GITHUB_TOKEN bez uprawnienia write)."

      - name: Enforce duplicate thresholds for new code
        if: always()
        shell: bash
        run: |
          echo "Nowe duplikaty: ${{ steps.dup-report.outputs.duplicate_count }}"
          echo "Status: ${{ steps.dup-report.outputs.duplicate_status }}"

          if [[ "${{ steps.dup-report.outputs.duplicate_status }}" == "warn" ]]; then
            echo "::warning::Przekroczono próg ostrzegawczy nowych duplikatów (${NEW_DUPLICATES_WARN_THRESHOLD})."
          fi

          if [[ "${{ steps.dup-report.outputs.duplicate_status }}" == "fail" ]]; then
            echo "::error::Przekroczono próg blokujący nowych duplikatów (${NEW_DUPLICATES_FAIL_THRESHOLD})."
            exit 1
          fi


      - name: Function complexity gate (length/nesting/branching)
        if: steps.changed-py.outputs.has_changes == 'true'
        shell: bash
        run: |
          python scripts/ci/enforce_function_complexity.py \
            --base-sha "${{ steps.changed-py.outputs.base_sha }}" \
            --head-sha "${{ github.sha }}" \
            --changed-files "${{ steps.changed-py.outputs.changed_files }}" \
            --max-function-lines "${FUNCTION_MAX_LINES}" \
            --max-nesting "${FUNCTION_MAX_NESTING}" \
            --max-branches "${FUNCTION_MAX_BRANCHES}"

      - name: Magic source-name strings gate
        if: steps.changed-py.outputs.has_changes == 'true'
        shell: bash
        run: |
          python scripts/ci/enforce_source_name_magic_strings.py \
            --base-sha "${{ steps.changed-py.outputs.base_sha }}" \
            --head-sha "${{ github.sha }}" \
            --changed-files "${{ steps.changed-py.outputs.changed_files }}"

      - name: Duplicate default-config values gate
        shell: bash
        run: |
          python scripts/ci/check_duplicate_default_configs.py

      - name: Deprecated elements lifecycle report gate
        shell: bash
        run: |
          python scripts/ci/deprecated_elements_report.py \
            --report-json .ci-report/deprecated-elements.json \
            --output-md .ci-report/deprecated-elements.md

      - name: No new print(...) outside allowlist gate
        if: steps.changed-py.outputs.has_changes == 'true'
        shell: bash
        run: |
          python scripts/ci/enforce_no_new_prints.py \
            --base-sha "${{ steps.changed-py.outputs.base_sha }}" \
            --head-sha "${{ github.sha }}" \
            --changed-files "${{ steps.changed-py.outputs.changed_files }}"
      - name: Architectural import rules (import-linter)
        run: |
          lint-imports --config importlinter.ini

      - name: Unused imports regression gate (layer wiring)
        run: |
          ruff check layers/zero/executor.py layers/application.py --select F401
          
      - name: Any policy for new modules (rollout scope)
        shell: bash
        run: |
          python scripts/ci/enforce_new_module_any_policy.py \
            --base-sha "${{ steps.changed-py.outputs.base_sha }}" \
            --head-sha "${{ github.sha }}"

      - name: Complexity structure gate for changed Python files (ruff)
        if: steps.changed-py.outputs.has_changes == 'true'
        shell: bash
        run: |
          mapfile -t PY_FILES < <(echo "${{ steps.changed-py.outputs.changed_files }}" | tr ',' '\n' | sed '/^$/d')
          ruff check "${PY_FILES[@]}" \
            --preview \
            --select PLR0912,PLR0915,PLR1702

      - name: Strict typing regression gate (mypy)
        shell: bash
        run: |
          python scripts/ci/mypy_regression_gate.py \
            --base-sha "${{ steps.changed-py.outputs.base_sha }}" \
            --head-sha "${{ github.sha }}" \
            --error-budget "${MYPY_ERROR_BUDGET}"


      - name: DI anti-pattern AST check (layers + selected scrapers)
        shell: bash
        run: |
          ADR_REFERENCE_TEXT=""
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            ADR_REFERENCE_TEXT="${{ github.event.pull_request.title }} ${{ github.event.pull_request.body }}"
          else
            ADR_REFERENCE_TEXT="${{ github.event.head_commit.message }}"
          fi

          mapfile -t DI_SCOPE_FILES < <(printf '%s
' "${{ steps.changed-py.outputs.changed_files }}" | tr ',' '
' | sed '/^$/d' | grep -E '^(layers/|scrapers/base/|scrapers/drivers/infobox/).+\.py$' || true)

          if [[ ${#DI_SCOPE_FILES[@]} -eq 0 ]]; then
            echo "Brak zmian Python w layers/*, scrapers/base/* i scrapers/drivers/infobox/* - pomijam check DI."
            exit 0
          fi

          python scripts/check_di_antipatterns.py "${DI_SCOPE_FILES[@]}"             --adr-reference-text "$ADR_REFERENCE_TEXT"             --adr-required-violation-threshold 3
      - name: Domain contracts gate (pytest)
        run: |
          pytest -q tests/test_domain_role_contracts.py tests/test_domain_role_contracts_ci_meta.py tests/test_di_antipatterns_ci_meta.py
