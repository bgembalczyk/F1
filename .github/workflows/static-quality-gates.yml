name: Static quality gates

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  static-analysis:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run pre-commit on all files
        run: pre-commit run --show-diff-on-failure --color=always --all-files

      - name: Enforce ADR reference for architecture changes
        env:
          PR_TITLE: ${{ github.event.pull_request.title || '' }}
          PR_BODY: ${{ github.event.pull_request.body || '' }}
        run: |
          python scripts/ci/enforce_architecture_adr_reference.py \
            --base-sha "${{ github.event.pull_request.base.sha || github.event.before }}" \
            --head-sha "${{ github.event.pull_request.head.sha || github.sha }}" \
            --pr-title "$PR_TITLE" \
            --pr-body "$PR_BODY"

      - name: DI anti-pattern AST check
        env:
          ADR_REFERENCE_TEXT: >-
            ${{ github.event.pull_request.title || '' }}
            ${{ github.event.pull_request.body || '' }}
        run: |
          mapfile -t TARGETS < <(
            git ls-files '*.py' \
            | grep -E '^(layers/|scrapers/base/|scrapers/drivers/infobox/).+\.py$' || true
          )
          if [ "${#TARGETS[@]}" -eq 0 ]; then
            echo "No DI-targeted Python files found; skipping."
            exit 0
          fi
          python scripts/check_di_antipatterns.py \
            --adr-reference-text "$ADR_REFERENCE_TEXT" \
            "${TARGETS[@]}"

      - name: Domain role contract suite
        run: pytest -q tests/test_domain_role_contracts.py
