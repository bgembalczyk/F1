name: Test profiles

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      profile:
        description: "Profile to run"
        required: true
        default: full
        type: choice
        options:
          - quick
          - full

jobs:
  tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Select profile
        id: profile
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            PROFILE="${{ inputs.profile }}"
          elif [[ "${{ github.event_name }}" == "pull_request" ]]; then
            PROFILE="quick"
          else
            PROFILE="full"
          fi
          echo "profile=$PROFILE" >> "$GITHUB_OUTPUT"
          echo "Selected profile: $PROFILE"

      - name: Run quick profile (unit + contract)
        if: steps.profile.outputs.profile == 'quick'
        run: |
          pytest -q -m "unit or contract"

      - name: Run full profile (all tests)
        if: steps.profile.outputs.profile == 'full'
        run: |
          pytest -q

      - name: Run coverage and export XML
        run: |
          pytest -q --cov=. --cov-report=term-missing --cov-report=xml:coverage.xml

      - name: Resolve base SHA for coverage diff gates
        id: coverage_shas
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            BASE_SHA="${{ github.event.pull_request.base.sha }}"
          else
            BASE_SHA="${{ github.event.before }}"
          fi

          if [[ -z "$BASE_SHA" || "$BASE_SHA" == "0000000000000000000000000000000000000000" ]]; then
            BASE_SHA="$(git rev-list --max-count=1 HEAD^)"
          fi

          echo "base_sha=$BASE_SHA" >> "$GITHUB_OUTPUT"
          echo "head_sha=${{ github.sha }}" >> "$GITHUB_OUTPUT"

      - name: Coverage quality gates (patch/global/legacy)
        run: |
          python scripts/ci/enforce_coverage_quality.py \
            --coverage-xml coverage.xml \
            --baseline .ci/coverage-baseline.json \
            --policy .ci/coverage-policy.json \
            --legacy-files .ci/legacy-low-coverage-files.txt \
            --base-sha "${{ steps.coverage_shas.outputs.base_sha }}" \
            --head-sha "${{ steps.coverage_shas.outputs.head_sha }}"
