[mypy]
python_version = 3.10
pretty = True
show_error_codes = True
warn_unused_ignores = True
warn_return_any = True
no_implicit_optional = True
check_untyped_defs = True
disallow_incomplete_defs = True
disallow_untyped_defs = True
disallow_any_explicit = True
ignore_missing_imports = True
follow_imports = silent

files =
    scrapers/base/pipeline_runner.py,
    scrapers/base/options.py,
    scrapers/base/table/pipeline.py,
    scrapers/base/sections/interface.py,
    layers/seed/data_classes.py,
    layers/seed/registry/constants.py,
    layers/seed/registry/helpers.py,
    layers/seed/registry/entries.py

[mypy-layers.seed.*]
strict = True
disallow_any_generics = True
warn_unreachable = True
