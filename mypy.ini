[mypy]
python_version = 3.10
pretty = True
show_error_codes = True
warn_unused_ignores = True
warn_return_any = True
no_implicit_optional = True
check_untyped_defs = True
disallow_incomplete_defs = True
disallow_untyped_defs = True
disallow_any_explicit = True
ignore_missing_imports = True
follow_imports = silent

files =
    scrapers/base/pipeline_runner.py,
    scrapers/base/options.py,
    scrapers/base/table/pipeline.py,
    scrapers/base/sections/interface.py

[mypy-layers.one.executor]
disallow_any_expr = True

[mypy-layers.zero.executor]
disallow_any_expr = True

[mypy-layers.orchestration.helpers]
disallow_any_expr = True

[mypy-layers.orchestration.factories]
disallow_any_expr = True

[mypy-layers.seed.registry.helpers]
disallow_any_expr = True
