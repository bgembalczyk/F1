[mypy]
python_version = 3.10
pretty = True
show_error_codes = True
warn_unused_ignores = True
warn_return_any = True
no_implicit_optional = True
check_untyped_defs = True
disallow_incomplete_defs = True
disallow_untyped_defs = True
disallow_any_explicit = True
ignore_missing_imports = True
follow_imports = silent

files =
    scrapers/base/pipeline_runner.py,
    scrapers/base/options.py,
    scrapers/base/table/pipeline.py,
    scrapers/base/sections/interface.py,
    layers/,
    validation/,
    infrastructure/http_client/

# Roadmap strict typing (per pakiet, docelowo budżet = 0):
# - Etap 1 (budżet błędów: 0)
#   Moduły: scrapers.base.pipeline_runner, scrapers.base.options,
#           scrapers.base.table.pipeline, scrapers.base.sections.interface
# - Etap 2 (budżet błędów: 0)
#   Moduły: layers.application, layers.one.executor,
#           layers.orchestration.runners.function_export,
#           layers.orchestration.runners.grand_prix
# - Etap 3 (budżet błędów: 0)
#   Moduły: layers.seed.data_classes, layers.seed.helpers,
#           layers.seed.registry.constants, layers.seed.registry.entries,
#           layers.seed.registry.helpers, layers.zero.executor, layers.zero.merge
# - Etap 4 (budżet błędów: 0)
#   Moduły: validation.composite_validator, validation.record_factory_validator,
#           validation.rules, validation.schema_engine, validation.schema_rules,
#           validation.schemas, validation.validator_base
# - Etap 5 (budżet błędów: 0)
#   Moduły: infrastructure.http_client.clients.base,
#           infrastructure.http_client.clients.urllib_http,
#           infrastructure.http_client.components.request_executor,
#           infrastructure.http_client.interfaces.http_client_protocol,
#           infrastructure.http_client.policies.default_retry,
#           infrastructure.http_client.policies.retry,
#           infrastructure.http_client.requests_shim.http_error,
#           infrastructure.http_client.requests_shim.session
#
# Domyślnie strict dla katalogów z `files`; wyjątki poniżej są tymczasowe.
[mypy-layers.application,layers.one.executor,layers.orchestration.runners.function_export,layers.orchestration.runners.grand_prix]
ignore_errors = True

[mypy-layers.seed.data_classes,layers.seed.helpers,layers.seed.registry.constants,layers.seed.registry.entries,layers.seed.registry.helpers,layers.zero.executor,layers.zero.merge]
ignore_errors = True

[mypy-validation.composite_validator,validation.record_factory_validator,validation.rules,validation.schema_engine,validation.schema_rules,validation.schemas,validation.validator_base]
ignore_errors = True

[mypy-infrastructure.http_client.clients.base,infrastructure.http_client.clients.urllib_http,infrastructure.http_client.components.request_executor,infrastructure.http_client.interfaces.http_client_protocol,infrastructure.http_client.policies.default_retry,infrastructure.http_client.policies.retry,infrastructure.http_client.requests_shim.http_error,infrastructure.http_client.requests_shim.session]
ignore_errors = True
