exclude: '^data/'

repos:
  - repo: local
    hooks:
      - id: check-single-wiki-hook-names
        name: check-single-wiki-hook-names
        entry: python scripts/check_single_wiki_hook_names.py
        language: system
        pass_filenames: true
        files: ^scrapers/.*\.py$
      - id: check-architecture-rules
        name: check-architecture-rules
        entry: python scripts/check_architecture_rules.py
        language: system
        pass_filenames: true
        files: ^scrapers/.*\.py$
      - id: enforce-structural-quality
        name: enforce-structural-quality
        entry: python -m scripts.ci.enforce_structural_quality
        language: system
        pass_filenames: true
        files: ^(layers|models|scrapers|validation|infrastructure|complete_extractor|config)/.*\.py$
      - id: enforce-no-dead-code
        name: enforce-no-dead-code
        entry: python scripts/ci/enforce_no_dead_code.py
        language: system
        pass_filenames: false

  # Python lint + autofix + format
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.4.7
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  # Małe sanity checks dla repo
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-merge-conflict
      - id: check-yaml
      - id: detect-private-key
      - id: mixed-line-ending
      - id: check-case-conflict
      - id: debug-statements
      - id: check-builtin-literals
      - id: check-docstring-first
